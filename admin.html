<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - UMEB Photo Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        .admin-container { max-width: 1200px; margin: 100px auto 50px; padding: 20px; }
        .admin-card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .hidden { display: none !important; }
        
        /* Auth Styles */
        #auth-section { max-width: 400px; margin: 0 auto; }
        .auth-error { color: #e74c3c; margin-top: 10px; text-align: center; }
        
        /* Dashboard Styles */
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        /* Upload Form */
        .upload-form { display: grid; gap: 15px; }
        .upload-form input[type="file"] { padding: 10px; border: 1px dashed #ccc; border-radius: 4px; }
        .upload-status { margin-top: 10px; font-weight: bold; }
        .success { color: #2ecc71; }
        .error { color: #e74c3c; }

        /* Gallery Admin Grid */
        .admin-gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .admin-gallery-item { position: relative; border-radius: 8px; overflow: hidden; aspect-ratio: 1; }
        .admin-gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .gallery-item-actions { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; }
        .btn-action { color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; transition: background 0.3s; }
        .btn-replace { background: #3498db; }
        .btn-replace:hover { background: #2980b9; }

        /* Modal Styles */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 8px; max-width: 500px; width: 90%; position: relative; }
        .modal-close { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: #666; }
        .preview-container { display: flex; gap: 15px; margin-bottom: 20px; }
        .preview-box { flex: 1; text-align: center; }
        .preview-box img { max-width: 100%; max-height: 150px; border-radius: 4px; object-fit: contain; background: #f0f0f0; }
        #validation-message { margin-top: 10px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
    <nav class="navbar" style="background: #1a2530;">
        <div class="container nav-container">
            <div class="nav-brand">
                <h1>UMEB Admin</h1>
            </div>
            <ul class="nav-menu" style="display: flex;">
                <li><a href="index.html" class="nav-link">Back to Website</a></li>
                <li id="logout-btn" class="hidden"><a href="#" class="nav-link" onclick="logout()">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="container admin-container">
        
        <!-- LOGIN SECTION -->
        <div id="auth-section" class="admin-card">
            <h2 class="text-center" style="margin-bottom: 20px;">Admin Login</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
                <div id="login-error" class="auth-error"></div>
            </form>
        </div>

        <!-- DASHBOARD SECTION -->
        <div id="dashboard-section" class="hidden">
            
            <div class="admin-card">
                <div class="admin-header">
                    <h2>Upload New Photo</h2>
                </div>
                <form id="upload-form" class="upload-form">
                    <div>
                        <label>Select Image File</label>
                        <input type="file" id="photo-file" accept="image/*" required style="width: 100%;">
                    </div>
                    <div>
                        <label>Alt Text (Description for Accessibility)</label>
                        <input type="text" id="photo-alt" placeholder="e.g., UMEB volunteers handing out food..." required>
                    </div>
                    <button type="submit" class="btn btn-primary" id="upload-btn">
                        <i class="fas fa-upload"></i> Upload to Gallery
                    </button>
                    <div id="upload-status" class="upload-status"></div>
                </form>
            </div>

            <div class="admin-card">
                <div class="admin-header">
                    <h2>Manage Gallery</h2>
                    <button class="btn btn-secondary" onclick="loadAdminGallery()"><i class="fas fa-sync"></i> Refresh</button>
                </div>
                <div id="admin-gallery-grid" class="admin-gallery-grid">
                    <!-- Images will load here -->
                    <p>Loading photos...</p>
                </div>
            </div>

        </div>

    </div>

    <!-- REPLACE MODAL -->
    <div id="replace-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <span class="modal-close" onclick="closeReplaceModal()">&times;</span>
            <h2>Replace Image</h2>
            <p style="margin-bottom: 20px; font-size: 14px; color: #666;">Select a new image with the same aspect ratio to prevent layout issues.</p>
            
            <div class="preview-container">
                <div class="preview-box">
                    <strong>Original</strong><br>
                    <img id="original-preview" src="" alt="Original">
                    <div id="original-dims" style="font-size: 12px; color: #888;"></div>
                </div>
                <div class="preview-box">
                    <strong>New</strong><br>
                    <img id="new-preview" src="" alt="Preview" style="display: none;">
                    <div id="new-dims" style="font-size: 12px; color: #888;"></div>
                </div>
            </div>

            <form id="replace-form" class="upload-form">
                <div>
                    <label>Select New Image File</label>
                    <input type="file" id="replace-file" accept="image/*" required style="width: 100%;">
                </div>
                <div>
                    <label>Alt Text (Description)</label>
                    <input type="text" id="replace-alt" placeholder="e.g., UMEB volunteers handing out food..." required>
                </div>
                <div id="validation-message"></div>
                <button type="submit" class="btn btn-replace" id="confirm-replace-btn" disabled>
                    <i class="fas fa-exchange-alt"></i> Confirm Replacement
                </button>
            </form>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
